<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --brightness: 1.0; --hue: 0deg; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        .viewport {
            width: 100vw; height: 100vh;
            filter: brightness(var(--brightness)) hue-rotate(var(--hue));
            transition: filter 2.0s ease-in-out; 
            overflow: hidden;
            position: relative;
        }

        #target {
            display: flex;
            position: absolute;
            top: 0; left: 0;
            width: 300%; /* [원본-반전-원본] 3개 레이어 고정 */
            height: 100%;
            will-change: transform;
        }

        .layer {
            flex: 0 0 33.3333%; /* 정확히 화면 너비 1개분 */
            height: 100%;
            background: url('sea-landscape.jpg') center/cover no-repeat;
        }

        /* 사용자님의 정석: 좌우반전 로테이션 파노라마 */
        .layer:nth-child(2) { transform: scaleX(-1); }
    </style>
</head>
<body>
    <div class="viewport">
        <div id="target">
            <div class="layer"></div><div class="layer"></div><div class="layer"></div>
        </div>
    </div>

    <script id="data-bridge"></script>
    <script>
        let currentX = 0;
        let speed = 45; 
        const target = document.getElementById('target');
        let lastTime = performance.now();

        function animate(now) {
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            const viewWidth = window.innerWidth;
            // 2개 레이어 분량(viewWidth * 2)을 speed(초) 동안 이동하는 속도
            const step = (viewWidth * 2 / speed) * delta;
            
            currentX -= step;

            // [이론적 핵심] 원본+반전이 끝나는 지점인 -(viewWidth * 2)에서 리셋
            if (currentX <= -(viewWidth * 2)) {
                // 단순 0 리셋이 아니라, 초과한 오차값만큼 더해줘야 끊김이 없음
                currentX += (viewWidth * 2);
            }

            target.style.transform = `translateX(${currentX}px)`;
            requestAnimationFrame(animate);
        }

        function updateEnv(p, b, h, s) {
            document.documentElement.style.setProperty('--brightness', b);
            document.documentElement.style.setProperty('--hue', h + 'deg');
            speed = s;
        }

        setInterval(() => {
            const old = document.getElementById('data-bridge');
            const nw = document.createElement('script');
            nw.id = 'data-bridge';
            nw.src = 'data.js?v=' + Date.now();
            old.parentNode.replaceChild(nw, old);
        }, 500);

        requestAnimationFrame(animate);

        // 브라우저 크기 변경 시 대응
        window.addEventListener('resize', () => {
            currentX = 0; // 리셋 지점 재계산을 위해 초기화
        });
    </script>
</body>
</html>
