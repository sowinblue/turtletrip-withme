<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleTrip</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/turtle.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">

        <section class="turtle-section">
            <h2>거북이의 여행 🐢</h2>
            
            <div class="turtle_moveline-section"> <div class="turtle_container" style="left: {{ rate }}%;"> <img id="turtle_img" class="turtle" src="{{ url_for('static', filename='images/turtle_idle.svg') }}" alt="거북이 대기" width="90">
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-track">
                    <div id="turtle-progress-bar" class="progress-fill" style="width: {{ rate }}%;">
                        <span class="progress-text">{{ rate }}%</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="checklist-section">
            <h3>오늘의 할 일</h3>

            <form action="/update_todo" method="POST" class="input-group">
                <input type="text" name="todo_content" class="input-box" placeholder="오늘 할 일을 입력하세요!" required>
                <button type="submit" class="add-btn">추가</button>
            </form>

            <div class="todo-list-container">
                
                {% for task in tasks %}
                
                <div class="todo-item {{ 'completed' if task.is_done else '' }}">
                    
                    <label class="checkbox-label">
                        <input type="checkbox" 
                        class="real-checkbox" 
                        data-id="{{ task.id }}" 
                        {% if task.is_done %}checked{% endif %}>
                        <span class="checkmark"></span>
                    </label>

                    <span class="todo-text">{{ task.content }}</span>
                    
                    <button class="delete-btn" onclick="location.href='/delete_todo/{{ task.id }}'">삭제</button>
                </div>
                
                {% endfor %}

            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/turtle.js') }}" defer></script>
</body>
</html>
