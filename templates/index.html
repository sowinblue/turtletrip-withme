<!DOCTYPE html> <!-- 전체 사용할 메인 페이지 -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ? Layout & theme: edit.html 폼 일시 변경에 사용되는 HTMX 도구 세팅에 필요한 한 줄 -->
    <title>터틀트립 (TurtleTrip)</title>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/turtle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/checklist.css') }}"> <!-- 각 스타일시트 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <section class="turtle-section">
            <h2>거북이의 여행 🐢</h2>
            
            <div class="turtle_moveline-section"> <div class="turtle_container" style="left: {{ rate }}%;"> <img id="turtle_img" class="turtle" src="{{ url_for('static', filename='images/turtle/turtle_idle.svg') }}" alt="거북이 대기" width="90">
                </div>
            </div>
        </header>


        <section class="checklist-section">
            <h3>오늘의 할 일</h3> 

            <form action="/update_todo" method="POST" class="input-group">
                <input type="text" name="todo_content" class="input-box" placeholder="오늘 할 일을 입력하세요!" required>
                <button type="submit" class="add-btn">추가</button>
            </form>

                <ul id="task-list">
                    {% for task in tasks %} <!-- 현재 데이터 저장소에 있는 데이터를 for문으로 순회해서 가져오는 부분 -->
                    <li class="todo-item" id="task-{{ task.id }}">
                        <div class="item-main">
                            <input type="checkbox" 
                                hx-patch="/api/tasks/{{ task.id }}/toggle" 
                                hx-swap="none"
                                {% if task.is_completed %}checked{% endif %}> <!-- 체크박스 여부 출력 -->
                            <span class="task-text">{{ task.content }}</span> <!-- 가져온 데이터의 내용 부분을 출력 -->
                        </div>
                        
                        <div class="more-menu">
                            <button class="menu-btn">⋮</button>
                            <div class="menu-content">
                                <button hx-get="/api/tasks/{{ task.id }}/edit" 
                                        hx-target="#task-{{ task.id }}" 
                                        hx-swap="innerHTML">수정</button><!-- 수정할 할일의 고유 id -->
                                <button hx-delete="/api/tasks/{{ task.id }}" 
                                        hx-confirm="정말 삭제할까요?"
                                        hx-target="#task-{{ task.id }}" 
                                        hx-swap="outerHTML">삭제</button><!-- 삭제할 할일의 고유 id -->
                            </div>
                        </div> <!-- wntjr-->
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/turtle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/checklist.js') }}"></script>

</body>
</html>
