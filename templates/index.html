<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleTrip</title>

    <!-- 공통 스타일 파일 (Flask static 폴더 사용) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- 전체 화면을 감싸는 메인 컨테이너 -->
    <div class="main-container">

        <!-- 상단 영역 : 거북이 진행 상태 표시 -->
        <section class="turtle-section">
            <h2>거북이 경로</h2>

            <!--
                거북이 이미지 위치
                static/images/ 경로에 이미지 추가 후 사용
                예: turtle_idle.png
            -->
            <!--
            <img src="{{ url_for('static', filename='images/turtle_idle.png') }}" alt="거북이">
            -->
        </section>

        <!-- 하단 영역 : 오늘의 할 일 체크리스트 -->
        <section class="checklist-section">
            <h2>체크리스트</h2>

            <!-- 할 일 추가 폼
                입력값은 /update_todo 라우트로 POST 전송 -->
            <form action="/update_todo" method="POST" class="todo-form">
                <div class="todo-item">
                    <input type="text" id="task-input" placeholder="할 일을 입력하세요"/>
                    <input type="text" name="todo_content" placeholder="오늘 할 일을 입력하세요!">
                    <button type="submit">저장</button>
                </div>
            </form>
        </section>

    </div>
</body>
</html>
