<!DOCTYPE html> <!-- ! 전체 사용할 메인 페이지 -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ? Layout & theme: edit.html 폼 일시 변경에 사용되는 HTMX 도구 세팅에 필요한 한 줄 -->
    <title>터틀트립 (TurtleTrip)</title>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/turtle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/checklist.css') }}"> <!-- 각 스타일시트 불러오기 -->
</head>
<body>
    <div class="main-container"> <!-- 메인 컨테이너 -->
        <header class="journey-box">
            <div class="inner-ocean">
                <div class="wave-bg"></div>
                <div class="progress-bar-wrapper">
                    <div id="horizontal-progress-fill"></div>
                </div>
                <div id="turtle-group" class="turtle-container">
                    <div class="turtle-char">🐢</div>
                </div>
            </div>
        </header>

        <section class="todo-container">
            <div class="todo-main-card">
                <div class="input-section">
                    <input type="checkbox" id="initial-status">
                    <div class="input-wrapper">
                        <input type="text" id="task-input" placeholder="할 일을 입력하세요">
                        <button id="add-btn">추가</button>
                    </div>
                    <span id="progress-text-display">0%</span>
                </div>

                <ul id="task-list">
                    {% for task in tasks %}
                    <li class="todo-item" id="task-{{ task.id }}">
                        <div class="item-main">
                            <input type="checkbox" 
                                hx-patch="/api/tasks/{{ task.id }}/toggle" 
                                hx-swap="none"
                                {% if task.is_completed %}checked{% endif %}>
                            <span class="task-text">{{ task.content }}</span>
                        </div>
                        
                        <div class="more-menu">
                            <button class="menu-btn">⋮</button>
                            <div class="menu-content">
                                <button hx-get="/api/tasks/{{ task.id }}/edit" 
                                        hx-target="#task-{{ task.id }}" 
                                        hx-swap="innerHTML">수정</button>
                                <button hx-delete="/api/tasks/{{ task.id }}" 
                                        hx-confirm="정말 삭제할까요?"
                                        hx-target="#task-{{ task.id }}" 
                                        hx-swap="outerHTML">삭제</button>
                            </div>
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/turtle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/checklist.js') }}"></script>
</body>
</html>
