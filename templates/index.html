<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleTrip</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/turtle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/checklist.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/background.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style-progress-bubble.css"> <!--style-progress-bubble.css 연결-->
</head>

<body>

    <div class="main-container">

        <section class="turtle-section">  <!--거북이가 움직이는 공간-->
            <div class="viewport">
                <div id="target">
                    <div class="layer"></div><div class="layer"></div><div class="layer"></div>
                </div>
            </div>
            <h2>거북이의 여행 🐢</h2>

            <div class="turtle_moveline-section">
                <div class="turtle_container" style="left: {{ rate }}%;">
                        <div class="progress-bubble"> <!--말풍선 모양 잡는 부분-->
                            <span class="progress-text">{{ rate }}%</span> <!--내용물-->
                        </div>
                        <img id="turtle_img" class="turtle"

                        src="{{ url_for('static', filename='images/turtle/turtle_idle.svg') }}" alt="거북이 대기" width="90">
                </div>
            </div>
        </section>

        <section class="progress-bar-section"> <!--progress-container 분리-->
            <div class="progress-container"> <!--turtle-section에서 이사 시킴_거북이 움직이는 공간과 분리-->
                <div class="progress-track">
                    <div id="turtle-progress-bar" class="progress-fill" style="width: {{ rate }}%;">
                        <span class="progress-text">{{ rate }}%</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="checklist-section">
            <h3>오늘의 할 일</h3>

            <form action="/update_todo" method="POST" class="input-group">
                <input type="text" name="todo_content" class="input-box" placeholder="오늘 할 일을 입력하세요!" required>
                <button type="submit" class="add-btn">추가</button>
            </form>

            <div class="todo-list-container">

                {% for task in tasks %}

                <div class="todo-item {{ 'completed' if task.is_done else '' }}">
                    
                <label class="checkbox-label">
                    <input type="checkbox" 
                        class="real-checkbox" 
                        data-id="{{ task.id }}" 
                        {% if task.is_done %}checked{% endif %}>
                    <span class="checkmark"></span>
                </label>

                <span class="todo-text">{{ task.content }}</span>
                <div class="more-menu-wrapper" style="margin-left: 10px;">
                    <button type="button" onclick="toggleMenu('menu-{{ task.id }}')" style="background:none; border:none; cursor:pointer;">⋮</button>
                    
                    <div id="menu-{{ task.id }}" class="todo-menu" style="display: none; background: #fff; border: 1px solid #ddd; padding: 5px; border-radius: 5px;">
                        <a href="/edit_todo/{{ task.id }}" style="font-size: 12px; margin-right: 5px;">수정</a>
                        <form action="/delete_todo/{{ task.id }}" method="POST" style="display: inline;">
                            <button type="submit" class="delete-btn">삭제</button>
                        </form>
                    </div>

                </div>
                </div>
                {% endfor %}
        </section>
        </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"defer></script>
    <script src="{{ url_for('static', filename='js/turtle.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/checklist.js') }}" defer></script>

    <script>
        let currentX = 0;
        let speed = 45; 
        const target = document.getElementById('target');
        let lastTime = performance.now();

        function animate(now) {
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            const viewWidth = target.parentNode.clientWidth;
            const step = (viewWidth * 2 / speed) * delta;
            
            currentX -= step;

            if (currentX <= -(viewWidth * 2)) {
                currentX += (viewWidth * 2);
            }

            target.style.transform = `translateX(${currentX}px)`;
            requestAnimationFrame(animate);
        }

        function updateEnv(p, b, h, s) {
            document.documentElement.style.setProperty('--brightness', b);
            document.documentElement.style.setProperty('--hue', h + 'deg');
            speed = s;
        }

        // 페이지 로드 시 Flask에서 전달된 값으로 배경 즉시 업데이트
        updateEnv({{ rate }}, {{ brightness }}, {{ hue }}, {{ speed }});

        requestAnimationFrame(animate);

        window.addEventListener('resize', () => {
            currentX = 0;
        });
    </script>
</body>

</html>
