<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 관리</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="main-container">
        <section class="turtle-section">
            <h2>거북이 경로</h2>
            <div class="progress-container">
                <div class="progress-info">
                    <span class="progress-label">달성률</span>
                    <span class="progress-percentage">{{ completion_rate }}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: {{ completion_rate }}%;"></div>
                </div>
            </div>
        </section>
        
        <section class="checklist-section">
            <h2>체크리스트</h2>
            
            <!-- 할 일 추가 폼 -->
            <form action="/add_todo" method="POST" class="todo-form">
                <div class="todo-item">
                    <input type="text" name="todo_content" placeholder="오늘 할 일을 입력하세요!" required>
                    <button type="submit">추가</button>
                </div>
            </form>
            
            <!-- 할 일 목록 표시 -->
            <div class="todo-list">
                {% for task in tasks %}
                <div class="todo-item">
                    <!-- 완료 토글 -->
                    <form action="/toggle_todo/{{ task.id }}" method="POST" style="display: inline;">
                        <input type="checkbox" 
                            {% if task.is_completed %}checked{% endif %}
                            onchange="this.form.submit()">
                    </form>
                    
                    <!-- 할 일 내용 -->
                    <span class="{% if task.is_completed %}completed{% endif %}">
                        {{ task.content }}
                    </span>
                    
                    <!-- 삭제 버튼 -->
                    <form action="/delete_todo/{{ task.id }}" method="POST" style="display: inline;">
                        <button type="submit" class="delete-btn">삭제</button>
                    </form>
                </div>
                {% endfor %}
            </div>
        </section>
    </div>
</body>
</html>
