<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleTrip</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="main-container">

        <section class="turtle-section">
            <h2>거북이의 여행 🐢</h2>
            
            <div class="progress-container">
                <div class="progress-track">
                    <div id="turtle-progress-bar" class="progress-fill" style="width: 50%;">
                        <span class="progress-text">50%</span> # UI확인용 예시로 50퍼로 설정
                    </div>
                </div>
            </div>
            </section>

        <section class="checklist-section">
            <h2>체크리스트</h2>

            <form action="/update_todo" method="POST" class="todo-form">
                <div class="todo-item">

                    <label>
                        <input type="checkbox" name="is_done" value="done">
                        완료
                    </label>

                    <input
                        type="text"
                        name="todo_content"
                        placeholder="오늘 할 일을 입력하세요!"
                    >

                    <button type="submit">저장</button>
                </div>
            </form>

        </section>
    </div>
</body>
</html>
