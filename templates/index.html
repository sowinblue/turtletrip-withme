<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="main-container">
        <section class="turtle-section">
            <h2>거북이 경로</h2>
        </section>
        <section class="checklist-section">
            <h2>체크리스트</h2>
            
            <!-- 기존에 저장된 할 일 목록 표시 -->
            <div class="saved-tasks">
                {% for task in tasks %}
                <div class="todo-item saved">
                    <input type="checkbox" {% if task.is_done %}checked{% endif %} disabled>
                    <span class="task-content {% if task.is_done %}done{% endif %}">{{ task.content }}</span>
                </div>
                {% endfor %}
            </div>
            
            <!-- 새로운 할 일 추가 폼 -->
            <form action="/update_todo" method="POST" class="todo-form">
                <div class="todo-item">
                    <input type="checkbox" name="is_done" value="done">
                    <input type="text" name="todo_content" placeholder="오늘 할 일을 입력하세요!">
                    <button type="submit">저장</button>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
