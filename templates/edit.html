<!DOCTYPE html>
<html lang="ko">
<head>
    <title>할 일 수정</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/checklist.css') }}">
</head>
<body class="main-container" style="justify-content: center; align-items: center;">
    <section class="checklist-section" style="width: 100%; max-width: 500px; flex: none;">
        <h3>할 일 수정</h3>
        <form action="/edit_todo/{{ task.id }}" method="POST">
            <input type="text" name="content" class="input-box" value="{{ task.content }}" required style="width: 100%; margin-bottom: 20px;">
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="add-btn" style="flex: 1;">저장</button>
                <a href="/" style="flex: 1; text-align: center; text-decoration: none; background: #eee; color: #333; padding: 10px; border-radius: 8px;">취소</a>
            </div>
        </form>
    </section>
</body>
</html>
